<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Contact Finder - USA Partner Lead Engine</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>USA Partner Lead Engine</h1>
      <p>Find practical outbound partner leads for U.S.-focused recruitment pipelines.</p>

      <form id="search-form">
        <fieldset>
          <legend>Search focus</legend>
          <label><input type="checkbox" name="categories" value="hotels" checked /> Hospitality schools</label>
          <label><input type="checkbox" name="categories" value="restaurants" checked /> Culinary schools</label>
          <label><input type="checkbox" name="categories" value="schools" checked /> Tourism colleges</label>
          <label><input type="checkbox" name="categories" value="j1Agencies" checked /> J1 / USA recruiters</label>
        </fieldset>

        <label>Mode
          <select name="mode">
            <option value="fast">Fast Mode</option>
            <option value="full">Full Harvest Mode</option>
          </select>
        </label>

        <label>Country <input name="country" placeholder="Philippines" required /></label>
        <label>City <input name="city" placeholder="Optional" /></label>
        <label>State / Province <input name="state" placeholder="Optional" /></label>
        <label>Result limit (fast mode) <input name="limit" type="number" min="1" max="500" value="25" /></label>

        <button type="submit">Run Search</button>
      </form>

      <section id="status"></section>
      <section id="actions"></section>
      <section id="table-wrap"></section>
      <section id="debug"></section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
